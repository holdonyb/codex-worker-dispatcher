name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test and build tools
        run: |
          python -m pip install build
          python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run public-release audit
        run: python -m unittest tests.test_public_release -v

      - name: Build wheel and source distribution
        run: python -m build

      - name: Smoke-test wheel and skill on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $smoke = Join-Path $env:RUNNER_TEMP "codex-worker-smoke"
          $skillTarget = Join-Path $env:RUNNER_TEMP "codex-worker-skill"
          python -m venv $smoke
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $smokePython = Join-Path $smoke "Scripts/python.exe"
          $worker = Join-Path $smoke "Scripts/codex-worker.exe"
          & $smokePython -m pip install --no-index --find-links dist codex-worker-dispatcher
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $worker --version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $worker skill install --target $skillTarget
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Smoke-test wheel and skill on POSIX
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          smoke="$RUNNER_TEMP/codex-worker-smoke"
          skill_target="$RUNNER_TEMP/codex-worker-skill"
          python -m venv "$smoke"
          smoke_python="$smoke/bin/python"
          worker="$smoke/bin/codex-worker"
          "$smoke_python" -m pip install --no-index --find-links dist codex-worker-dispatcher
          "$worker" --version
          "$worker" skill install --target "$skill_target"

      - name: Upload distributions
        if: runner.os == 'Linux' && matrix.python-version == '3.14'
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/*
          if-no-files-found: error
